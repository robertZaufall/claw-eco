# Daily update of GitHub stats in index.html
name: Update GitHub stats

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update GitHub stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 update_stats.py

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          current_sha="$(git rev-parse HEAD)"
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=$current_sha" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update GitHub stats"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi
        id: commit

  deploy:
    needs: update
    if: ${{ needs.update.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout pushed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update.outputs.commit_sha }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare deploy folder
        run: |
          mkdir _site
          cp index.html favicon.svg _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
